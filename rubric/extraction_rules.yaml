fast_text:
  min_characters_per_page: 100
  min_character_density: 0.001
  max_image_area_ratio: 0.5

vision:
  budget_cap_usd: 0.5

chunking_rules:
  keep_table_cells_with_headers: true
  attach_captions_to_figures: true
  keep_numbered_list_together: true
  propagate_section_headers: true
  resolve_cross_references: true
